name: marvin-ops

on:
  push:
    branches: [main]
    paths:
      - 'vault/**'
      - 'vault-thesis-en/**'
      - 'vault-implementation-en/**'
      - 'obsidian-vault-tautologia-ontologica/**'
      - 'mcp-server/**'
      - 'load-vaults/**'
      - 'marvin_ops.py'
  pull_request:
    paths:
      - 'mcp-server/**'
      - 'load-vaults/**'
      - 'marvin_ops.py'
  schedule:
    # Weekly self-improvement: Monday 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      command:
        description: 'Pipeline to run'
        required: true
        default: 'all'
        type: choice
        options:
          - sync
          - audit
          - improve
          - all
      threshold:
        description: 'Max drift points before failing (audit/all)'
        required: false
        default: '0'
        type: string

jobs:
  marvin-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/tautologia
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j -p tautologia 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      etcd:
        image: quay.io/coreos/etcd:v3.5.18
        env:
          ETCD_AUTO_COMPACTION_MODE: revision
          ETCD_AUTO_COMPACTION_RETENTION: '1000'
          ETCD_QUOTA_BACKEND_BYTES: '4294967296'
          ETCD_SNAPSHOT_COUNT: '50000'
        options: >-
          --health-cmd "etcdctl endpoint health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:RELEASE.2024-09-22T00-33-43Z
        env:
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      milvus:
        image: milvusdb/milvus:v2.5.4
        ports:
          - 19530:19530
        env:
          ETCD_ENDPOINTS: etcd:2379
          MINIO_ADDRESS: minio:9000
        options: >-
          --health-cmd "curl -f http://localhost:9091/healthz"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: mcp-server
        run: uv sync

      - name: Install load-vaults dependencies
        working-directory: load-vaults
        run: uv sync

      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "command=${{ inputs.command }}" >> "$GITHUB_OUTPUT"
            echo "threshold=${{ inputs.threshold || '0' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "command=all" >> "$GITHUB_OUTPUT"
            echo "threshold=0" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "command=audit" >> "$GITHUB_OUTPUT"
            echo "threshold=5" >> "$GITHUB_OUTPUT"
          else
            echo "command=all" >> "$GITHUB_OUTPUT"
            echo "threshold=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run marvin-ops
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASS: tautologia
          MILVUS_HOST: localhost
          MILVUS_PORT: '19530'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd mcp-server && uv run python ../marvin_ops.py \
            ${{ steps.cmd.outputs.command }} \
            --format json \
            --threshold ${{ steps.cmd.outputs.threshold }} \
            --save

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-audit-report
          path: mcp-server/docs/self-audit-report.md
          if-no-files-found: ignore
