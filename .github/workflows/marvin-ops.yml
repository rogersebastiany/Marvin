name: marvin-ops

on:
  push:
    branches: [main]
    paths:
      - 'vault/**'
      - 'vault-thesis-en/**'
      - 'vault-implementation-en/**'
      - 'obsidian-vault-tautologia-ontologica/**'
      - 'mcp-server/**'
      - 'load-vaults/**'
      - 'marvin_ops.py'
  pull_request:
    paths:
      - 'mcp-server/**'
      - 'load-vaults/**'
      - 'marvin_ops.py'
  schedule:
    # Weekly self-improvement: Monday 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      command:
        description: 'Pipeline to run'
        required: true
        default: 'all'
        type: choice
        options:
          - sync
          - audit
          - improve
          - all
      threshold:
        description: 'Max drift points before failing (audit/all)'
        required: false
        default: '0'
        type: string

jobs:
  marvin-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Start infrastructure
        run: docker compose up -d --wait --wait-timeout 120

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: mcp-server
        run: uv sync

      - name: Install load-vaults dependencies
        working-directory: load-vaults
        run: uv sync

      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "command=${{ inputs.command }}" >> "$GITHUB_OUTPUT"
            echo "threshold=${{ inputs.threshold || '0' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "command=all" >> "$GITHUB_OUTPUT"
            echo "threshold=0" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "command=audit" >> "$GITHUB_OUTPUT"
            echo "threshold=5" >> "$GITHUB_OUTPUT"
          else
            echo "command=all" >> "$GITHUB_OUTPUT"
            echo "threshold=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run marvin-ops
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASS: tautologia
          MILVUS_HOST: localhost
          MILVUS_PORT: '19530'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd mcp-server && uv run python ../marvin_ops.py \
            ${{ steps.cmd.outputs.command }} \
            --format json \
            --threshold ${{ steps.cmd.outputs.threshold }} \
            --save

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-audit-report
          path: mcp-server/docs/self-audit-report.md
          if-no-files-found: ignore

      - name: Stop infrastructure
        if: always()
        run: docker compose down
